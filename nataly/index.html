<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Slabo+27px&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/button.css">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            background:
                linear-gradient(rgba(0, 0, 0, 0.4),
                    rgba(0, 0, 0, 0.4)),
                url(images/background.jpg);
            color: white;
        }

        marquee {
            font-size: 80px;
            color: white;
        }


        #button-1 {
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        #button-2 {
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            text-align: center;
        }

        #button-3 {
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            text-align: center;
        }

        form {
            margin-top: 15vh;
        }

        .name,
        .last-name,
        .comment,
        .send {
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            text-align: center;
        }

        #comment {
            width: 200px;
            height: 200px;
        }
    </style>
</head>

<body>
    <marquee behavior="alternate">Los Animales</marquee>
    <div class="button-container">
        <a href="terrestres.html" class="button1" id="button-1">Animales Terrestres</a>
        <a href="acuaticos.html" class="button1" id="button-2">Animales Acuaticos</a>
        <a href="aereos.html" class="button1" id="button-3">Animales Aereos</a>

    </div>
    <form action="formulario.html">
        <div class="name">
            <label for="name">Nombre</label>
            <input type="text" name="name" id="name" required>
        </div>
        <div class="last-name">
            <label for="name">Apellidos</label>
            <input type="text" name="last-name" id="last-name">
        </div>
        <div class="comment">
            <label for="comment">Comentario</label>
            <textarea name="comment" id="comment" cols="30" rows="10"></textarea>
        </div>
        <div class="send">
            <input type="submit" value="Enviar Comentario">
        </div>
    </form>
</body>

</html>
