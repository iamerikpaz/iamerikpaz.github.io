<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 0px 0px;
            grid-template-areas:
                ". .";
        }

        .item-a {
            grid-column-start: 1;
            grid-column-end: span col4-start;
            grid-row-start: row1-start;
            grid-row-end: span 2;
            width: 50%;
            height: 100vh;
        }

        .item-b {
            grid-column-start: 2;
            grid-column-end: span end;
            grid-row-start: row1-start;
            grid-row-end: span 2;
            width: 45%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div class="parent">
        <iframe src="practica4.html" frameborder="0" class="item-a"></iframe>
        <iframe src="bienvenido25.html" frameborder="0" class="item-b" name="side"></iframe>
    </div>
</body>

</html>
