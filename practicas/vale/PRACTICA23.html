<!DOCTYPE html>
<html>
<head>
	<title>Formulario</title>
</head>
<body bgcolor="#EAADEA">
<center><h1>ESCRIBE UN COMENTARIO </h1></center>
<BR><BR>
<table border=0 align="center">

<form action="comentario.html" method="post">
	
	<tr>
		<td><label>Nombre:</label></td>
		<td><input type="text" name="nombre" size="35"></td>
	</tr>


	<tr>
		<td><label>Apellidos:</label></td>
		<td><input type="text" name="nombre" size="35"> </td>
	</tr>

	<tr>
		<td><label>Correo:</label></td>
		<td><input type="email" name="email" size="35"></td>
	</tr>

	<tr>
		<td><label>Cancion favorita:</label></td>
		<td><input type="text" name="cancion" size="35"></td>
	</tr>

	<tr>
		<td><label>Sexo:</label></td>
		<td><input type="radio" name="Sexo" value="Hombre">Hombre  <input type="radio" name="Sexo" value="Hombre">Mujer</td>
	 </tr>

	<tr>
		<td><label>Nivel de Estudios:</label></td>
		<td><input type="checkbox" name="Nivel" value="Primaria">Primaria,   <input type="checkbox" name="Nivel" value="Secundaria">Secundaria <input type="checkbox" name="Nivel" value="Preparatoria">Preparatoria </td>
	</tr>

	<tr>
		<td><label>Lugar de residencia:</label></td>
		<td><select name="Estado"> 
		     <option value="Guerrero">Guerrero</option>
		     <option value="Oaxaca">Oaxaca</option>
		     <option value="Chiapas">Chiapas</option></select> </td>
	 </tr>

	<tr>
		<td><label>Comentario:</label></td>
		<td><textarea name="Comentario" cols="37" rows="10"></textarea></td>
	</tr>

	 <tr>
		
		<center> <td colspan="2" align="center"><input type="submit" value="enviar" name="ENVIAR"> </center></td>
	</tr>
</table
</form>
</body>
</html>
